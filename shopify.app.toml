client_id = "7e9f86a69ad4625a163389a4163c8053"
application_url = "https://motivator-8uw.pages.dev"
embedded = true
name = "Wallery"

[webhooks]
api_version = "2026-07"

  # Order fulfillment pipeline: Shopify notifies our edge function when an order is
  # paid; the function submits it to the POD provider (Gelato). Registered on
  # `shopify app deploy`. (This subscription was previously missing entirely, so
  # orders never reached the backend.)
  [[webhooks.subscriptions]]
  topics = [ "orders/paid" ]
  uri = "https://qmqcvatfrcrgkcjblmyq.supabase.co/functions/v1/shopify-order-webhook"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_fulfillments,write_inventory,read_inventory,read_merchant_managed_fulfillment_orders,write_merchant_managed_fulfillment_orders,read_orders,write_orders,read_products,write_products,read_publications,write_publications,read_themes,write_themes,unauthenticated_read_product_listings"
optional_scopes = [ ]
use_legacy_install_flow = true

[auth]
redirect_urls = [
  "https://qmqcvatfrcrgkcjblmyq.supabase.co/functions/v1/shopify-oauth-callback"
]
