# Shopify OAuth callback — Shopify cannot send a Lovable JWT.
[functions.shopify-oauth-callback]
verify_jwt = false

# Storefront-proxy anropas från editor-iframe utan användarsession.
[functions.shopify-storefront]
verify_jwt = false

# Public, shop-scoped: resolves a shop's saved recipes for the customer editor.
[functions.storefront-recipes]
verify_jwt = false

# Gelato anropar webhooken utan Lovable-JWT — vi auth:ar via shared secret.
[functions.gelato-webhook]
verify_jwt = false

# Temporär engångs-reveal — auth via x-reveal-token-header.
[functions.reveal-gelato-secret]
verify_jwt = false

# Admin CRUD — vi verifierar Shopify App Bridge session-token själva (inte en
# Supabase-JWT), så Supabase-gatewayns JWT-koll måste vara av.
[functions.admin-templates]
verify_jwt = false

# OAuth install/status anropas från den inbäddade appen med publishable-nyckeln
# (inte en JWT), så gatewayns JWT-koll måste vara av.
[functions.shopify-oauth-install]
verify_jwt = false

[functions.shopify-oauth-status]
verify_jwt = false

# Mall-synk/radering: vi verifierar Shopify session-token själva i funktionen.
[functions.shopify-sync-template]
verify_jwt = false

[functions.shopify-delete-template]
verify_jwt = false

# Admin-inställningar (priser m.m.): session-token verifieras i funktionen.
[functions.admin-settings]
verify_jwt = false

# AI-receptbiblioteket (CRUD + Test): session-token verifieras i funktionen.
[functions.admin-ai-recipes]
verify_jwt = false

# Mapbox-token returneras till klienten (admin- + kund-editor) — publik pk-token.
[functions.get-mapbox-token]
verify_jwt = false

# Schemalagd storage-städning (triggas av pg_cron); egen secret-check i funktionen.
[functions.cleanup-previews]
verify_jwt = false
