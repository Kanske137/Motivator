project_id = "qmqcvatfrcrgkcjblmyq"

# Shopify OAuth callback — Shopify cannot send a Lovable JWT.
[functions.shopify-oauth-callback]
verify_jwt = false

# Storefront-proxy anropas från editor-iframe utan användarsession.
[functions.shopify-storefront]
verify_jwt = false

# Gelato anropar webhooken utan Lovable-JWT — vi auth:ar via shared secret.
[functions.gelato-webhook]
verify_jwt = false

# Temporär engångs-reveal — auth via x-reveal-token-header.
[functions.reveal-gelato-secret]
verify_jwt = false

# Admin CRUD — vi verifierar Shopify App Bridge session-token själva (inte en
# Supabase-JWT), så Supabase-gatewayns JWT-koll måste vara av.
[functions.admin-templates]
verify_jwt = false
